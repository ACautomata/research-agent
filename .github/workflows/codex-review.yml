name: Codex Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: codex-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review-and-merge:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write
    steps:
      # Codex Cloud auto-reviews on PR open/push — no need to trigger.
      # Bot comments ("@codex review") don't work; only user comments do.

      - name: Wait for Codex verdict
        id: verdict
        uses: actions/github-script@v7
        timeout-minutes: 10
        with:
          github-token: ${{ github.token }}
          script: |
            const { owner, repo } = context.repo;
            const pr_number = context.payload.pull_request.number;
            const head_sha = context.payload.pull_request.head.sha;
            const maxAttempts = 20;

            for (let i = 0; i < maxAttempts; i++) {
              await new Promise(r => setTimeout(r, 30000));

              // Fetch PR review comments (Codex posts these when it has suggestions)
              const reviews = await github.rest.pulls.listReviews({
                owner, repo,
                pull_number: pr_number
              });

              // Find Codex reviews for the current HEAD commit
              const codexReviews = reviews.data.filter(r =>
                r.user?.login === 'chatgpt-codex-connector' &&
                r.commit_id === head_sha
              );

              if (codexReviews.length > 0) {
                const latest = codexReviews[codexReviews.length - 1];
                if (latest.state === 'APPROVED') {
                  core.info('Codex approved');
                  core.setOutput('approved', 'true');
                  return;
                }
                // COMMENTED state means Codex has suggestions — not ready
                core.info('Codex commented with suggestions');
                core.setOutput('approved', 'false');
                return;
              }

              // Also check for 👍 reaction on the PR (Codex uses this when clean)
              try {
                const reactions = await github.rest.reactions.listForIssue({
                  owner, repo,
                  issue_number: pr_number
                });
                const thumbsUp = reactions.data.some(r => r.content === '+1');
                if (thumbsUp) {
                  core.info('Codex approved with thumbs up');
                  core.setOutput('approved', 'true');
                  return;
                }
              } catch (e) {
                core.info('Reactions check skipped: ' + e.message);
              }
            }

            core.info('Timed out waiting for Codex');
            core.setOutput('approved', 'false');

      - name: Merge PR
        if: steps.verdict.outputs.approved == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            await github.rest.pulls.merge({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              merge_method: 'merge',
            });
